repos:
- repo: https://github.com/woodruffw/zizmor-pre-commit
  rev: v1.25.2
  hooks:
    - id: zizmor

ci:
    autofix_commit_msg: |
        [pre-commit.ci] auto fixes from pre-commit.com hooks

        for more information, see https://pre-commit.ci
    autofix_prs: false
    skip: []
    submodules: false
